# Native Prometheus on the HOST (Windows/Linux install).
# If Prometheus runs in Docker, use prometheus-docker.yml instead — see docker/README.md.

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: kafka-broker-jmx
    static_configs:
      - targets: ['localhost:7071']

  - job_name: kafka-lag-exporter
    static_configs:
      - targets: ['localhost:9999']

rule_files:
  - alert-rules.yml
